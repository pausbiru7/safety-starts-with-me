<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Starts With Me</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;padding:12px}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden}
.header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:24px;text-align:center}
.header h1{font-size:1.4rem;font-weight:800;letter-spacing:1px}
.header p{font-size:.82rem;opacity:.85;margin-top:4px}
.badge{display:inline-block;background:#e74c3c;color:#fff;font-size:.7rem;padding:3px 10px;border-radius:20px;margin-top:8px;font-weight:700}
.section{padding:20px;border-bottom:1px solid #eee}
.section-title{font-size:1rem;font-weight:700;color:#1a5276;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.icon-blue{background:#dbeafe;color:#2563eb}.icon-red{background:#fee2e2;color:#dc2626}
.icon-green{background:#d1fae5;color:#059669}.icon-orange{background:#ffedd5;color:#ea580c}
.icon-purple{background:#ede9fe;color:#7c3aed}
label{display:block;font-size:.85rem;color:#555;margin-bottom:4px;font-weight:600}
input[type="text"],input[type="tel"],input[type="date"],input[type="time"],textarea,select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:.9rem;margin-bottom:12px;transition:border .2s;font-family:inherit;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2e86c1;box-shadow:0 0 0 3px rgba(46,134,193,.15)}
.row{display:flex;gap:10px}.row>div{flex:1}
.check-group{margin-bottom:10px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #eee;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.check-item:hover{border-color:#2e86c1;background:#f0f7ff}
.check-item.sel-g{border-color:#059669;background:#ecfdf5}
.check-item.sel-b{border-color:#dc2626;background:#fef2f2}
.check-item input[type="radio"]{accent-color:#2e86c1;width:16px;height:16px}
.check-item label{margin:0;cursor:pointer;font-weight:500;color:#333}
.hazard-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:10px}
.hazard-card .hazard-title{font-weight:700;color:#1a5276;margin-bottom:8px;font-size:.9rem}
.hazard-check{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:.85rem;color:#444}
.hazard-check input[type="checkbox"]{accent-color:#e74c3c;width:16px;height:16px;margin-top:2px;flex-shrink:0}
.control-box{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;padding:10px 12px;margin:4px 0 8px 24px;animation:fadeIn .3s}
.control-box label{color:#92400e;font-size:.8rem;font-weight:700;margin-bottom:4px}
.control-box textarea{margin-bottom:0;font-size:.82rem;border-color:#f59e0b;background:#fff}
.control-box textarea:focus{border-color:#d97706}
.custom-hazard-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.custom-hazard-row input[type="text"]{margin-bottom:0;flex:1}
.add-btn{background:#2e86c1;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.add-btn:hover{background:#1a5276}
.remove-btn{background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:.75rem;cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff}
.btn-wa{background:#25d366;color:#fff}
.btn-approve{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-reject{background:#ef4444;color:#fff}
.btn-back{background:#eee;color:#555}
.step{display:none}.step.active{display:block}
.dots{display:flex;justify-content:center;gap:6px;padding:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:all .3s}
.dot.active{background:#2e86c1;width:24px;border-radius:5px}
.sbox{background:#f8fafc;border-radius:12px;padding:14px;font-size:.83rem;line-height:1.9}
.sbox strong{color:#1a5276}
.sbox hr{border:none;border-top:1px dashed #ddd;margin:10px 0}
.sv-banner{text-align:center;padding:20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;margin:-20px -20px 16px;border-radius:0 0 16px 16px}
.result-card{text-align:center;padding:40px 20px}
.result-card .big{font-size:4rem;margin-bottom:12px}
.sent-info{background:#dbeafe;border-radius:10px;padding:12px;margin-top:16px;font-size:.82rem;color:#1e40af;text-align:left}
.sent-info.approved{background:#d1fae5;color:#065f46}
.sent-info.rejected{background:#fee2e2;color:#991b1b}
.footer{padding:16px;text-align:center;font-size:.75rem;color:#999}
.spv-card{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.spv-card:hover{border-color:#2e86c1;background:#f0f7ff}
.spv-card.selected{border-color:#2e86c1;background:#dbeafe}
.spv-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.spv-info{flex:1}.spv-info strong{display:block;font-size:.9rem;color:#1a5276}
.spv-info span{font-size:.78rem;color:#666}
.tag-badge{display:inline-block;background:#dbeafe;color:#1e40af;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-top:2px;font-weight:600}
</style>
</head>
<body>
<div class="container" id="app">
<div class="header">
  <h1>⛑️ SAFETY STARTS WITH ME</h1>
  <p>Daily Pre-Work Safety Checklist</p>
  <div class="badge" id="dateDisplay"></div>
</div>

<!-- WORKER MODE -->
<div id="WM">
  <div class="dots" id="dots"></div>
  <div class="section step active" id="step1"></div>
  <div class="section step" id="step2"></div>
  <div class="section step" id="step3"></div>
  <div class="section step" id="step4"></div>
  <div class="section step" id="step5"></div>
  <div class="section step" id="step6"></div>
</div>

<!-- SUPERVISOR MODE -->
<div id="SM" style="display:none"></div>

<!-- DONE MODE -->
<div id="SD" style="display:none"></div>

<div class="footer">Safety Starts With Me © 2026 | v3.0</div>
</div>

<script>
/* ============================================================
   KONFIGURASI — Ganti URL dan daftar supervisor di sini
   ============================================================ */
const BASE = "https://pausbiru7.github.io/safety-starts-with-me/safety-checklist.html";

// ⬇ Ganti dengan URL deployment Google Apps Script Anda
const GAS_URL = "https://script.google.com/macros/s/AKfycbxK-73RZaNNILlvC2ntjqSo6TZbilkS86ue0g2lyG4cGarY9KyOzWl90G2b-wfpMnkjsA/exec";

const HSE_NUMBER = "6282141150007"; // Nomor HSE Personil (tanpa +)

const SUPERVISORS = [
  { name: "Muharza",    title: "Project Manager",    wa: "628116923792", dept: "Project"   },
  { name: "Mudji Agus",   title: "Electrical Supervisor",  wa: "6281254346552", dept: "Project"        },
  { name: "Safarudin",     title: "Mechanical Supervisor",   wa: "6281315693779", dept: "Project"},
  { name: "Muh Yusuf",   title: "Project Controller",    wa: "6285399450821", dept: "Project"},
  { name: "Rengga Wahyu",     title: "QA/QC Officer",    wa: "6285783789408", dept: "Project"   }
];
/* ============================================================ */

/* LZ Compress/Decompress (URL-safe Base64) */
const LZ = {
  compress(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'') },
  decompress(s){ try{ let b=s.replace(/-/g,'+').replace(/_/g,'/'); while(b.length%4)b+='='; return decodeURIComponent(escape(atob(b))) }catch(e){ return null } }
};

/* App State */
const S  = { n:'', nid:'', p:'', pt:'', l:'', tgl:'', jam:'', spvIdx:null };
const HC = {};
const HZ = {};  // { key: { checked: bool, control: '' } }
const CT = {};
let customHazards = []; // [{text:'', control:''}]
let cur = 1;
const STEPS = 6;

const HZDATA = [
  {id:'mek', n:'⚙️ Bahaya Mekanik',    items:['Terjepit mesin','Terpotong benda tajam','Tertimpa material','Terbentur benda keras','Terjatuh dari ketinggian']},
  {id:'lis', n:'⚡ Bahaya Listrik',     items:['Tersengat listrik','Korsleting','Kabel terkelupas','Panel listrik rusak']},
  {id:'kim', n:'🧪 Bahaya Kimia',       items:['Terhirup gas/uap berbahaya','Terkena cipratan cairan kimia','Iritasi kulit','Keracunan']},
  {id:'erg', n:'🪑 Bahaya Ergonomi',    items:['Posisi kerja tidak ergonomis','Angkat beban berlebihan','Gerakan berulang','Pencahayaan buruk']},
  {id:'fis', n:'🌡️ Bahaya Fisik',      items:['Kebisingan tinggi','Suhu/cuaca ekstrem','Getaran berlebih','Paparan radiasi']},
  {id:'bio', n:'🦠 Bahaya Biologis',    items:['Paparan bakteri/virus','Gigitan serangga/hewan','Paparan jamur/lumut']},
  {id:'psi', n:'🧠 Bahaya Psikososial', items:['Tekanan kerja tinggi','Konflik antar rekan kerja','Kelelahan mental']}
];

const CTDATA = ['Helm (Safety Helmet)','Kacamata (Safety Glasses)','Sarung Tangan (Gloves)',
  'Sepatu Safety','Masker/Respirator','Ear Plug/Muff','Body Harness','Rompi Safety','Face Shield','APD Kimia'];

/* ============================================================
   INIT
   ============================================================ */
function init(){
  const p = new URLSearchParams(location.search);
  if(p.get('v')){ showSupervisor(p.get('v')); return; }
  if(p.get('d')){ showDone(p.get('d')); return; }
  renderWorker();
}

/* ============================================================
   SUPERVISOR VIEW
   ============================================================ */
function showSupervisor(enc){
  // Sembunyikan tampilan Worker Mode dan tampilkan Supervisor Mode
  document.getElementById('WM').style.display = 'none';
  document.getElementById('SM').style.display = 'block';

  console.log("Encoded data parameter (enc):", enc);

  const data = JSON.parse(LZ.decompress(enc));
  console.log("Decoded data object:", data);

  if(!data){
    // Jika data tidak dapat didekompresi/parsing, tampilkan pesan error
    document.getElementById('SM').innerHTML = `
      <div class="section">
        <p style="color:red; font-weight:bold; text-align:center;">Data tidak valid atau rusak. Silakan ulangi pengiriman checklist.</p>
      </div>`;
    return;
  }

  // Jika data valid, tampilkan form verifikasi supervisor
  document.getElementById('SM').innerHTML = `
    <div class="section">
      <div class="sv-banner">
        <div style="font-size:2.4rem">🔍</div>
        <h2 style="margin:8px 0">Verifikasi Supervisor</h2>
        <p style="opacity:.9;font-size:.85rem">Periksa dan setujui checklist berikut</p>
      </div>
      <div class="sbox">${summaryHTML(data)}</div>
      <div style="margin-top:20px">
        <label>Nama Supervisor</label>
        <input type="text" id="svNama" placeholder="Masukkan nama Anda" value="${data.spv_name||''}">
        <label>Catatan (opsional)</label>
        <textarea id="svNote" rows="2" placeholder="Tambahkan catatan jika perlu..."></textarea>
        <button class="btn btn-approve" onclick="approve('${encodeURIComponent(enc)}')">✅ APPROVE</button>
        <button class="btn btn-reject" onclick="reject('${encodeURIComponent(enc)}')">❌ REJECT</button>
      </div>
    </div>`;

  // Simpan data global sementara untuk manipulasi lanjut
  window._vdata = data;
}

function approve(enc){
  // Decode parameter enc yang di-encodeURIComponent sebelumnya
  const decodedEnc = decodeURIComponent(enc);
  const d = window._vdata;
  const sn = document.getElementById('svNama').value.trim();
  const sv = document.getElementById('svNote').value.trim();

  if(!sn){
    alert('Masukkan nama supervisor');
    return;
  }

  d.sv = { nama: sn, status: 'APPROVED', note: sv, time: new Date().toLocaleString('id-ID') };

  sendDone(d);
}

function reject(enc){
  // Decode parameter enc yang di-encodeURIComponent sebelumnya
  const decodedEnc = decodeURIComponent(enc);
  const d = window._vdata;
  const sn = document.getElementById('svNama').value.trim();
  const sv = document.getElementById('svNote').value.trim();

  if(!sn){
    alert('Masukkan nama supervisor');
    return;
  }
  if(!sv){
    alert('Berikan alasan penolakan');
    return;
  }

  d.sv = { nama: sn, status: 'REJECTED', note: sv, time: new Date().toLocaleString('id-ID') };

  sendDone(d);
}

async function sendDone(d){
  // Update status di Google Sheets via Google Apps Script
  try {
    await postToSheet({
      action: "respond",
      rowId: d.rowId || null,
      status: d.sv.status,
      sv_name: d.sv.nama,
      sv_note: d.sv.note
    });
  } catch(err){
    console.error("Gagal update Google Sheets:", err);
  }

  // Kompres data terbaru untuk link detail yang dikirimkan
  const enc  = LZ.compress(JSON.stringify(d));
  const url  = `${BASE}?d=${enc}`;
  const isApproved = d.sv.status === 'APPROVED';

  // Pesan ke pekerja
  const workerMsg = isApproved
    ? `✅ *CHECKLIST DISETUJUI*\n\nHalo ${d.n}, checklist safety Anda telah disetujui.\n\n👨‍💼 Supervisor: ${d.sv.nama}\n🕐 Waktu: ${d.sv.time}\n${d.sv.note ? '📝 Catatan: ' + d.sv.note : ''}\n\n🔗 Lihat Detail:\n${url}`
    : `❌ *CHECKLIST DITOLAK*\n\nHalo ${d.n}, checklist safety Anda ditolak.\n\n👨‍💼 Supervisor: ${d.sv.nama}\n📝 Alasan: ${d.sv.note}\n🕐 Waktu: ${d.sv.time}\n\n🔗 Lihat Detail:\n${url}`;

  // Pesan ke HSE
  const hseMsg = `📋 *LAPORAN SAFETY CHECKLIST*\n\n📌 Status: ${isApproved ? '✅ APPROVED' : '❌ REJECTED'}\n👷 Pekerja: ${d.n}\n🪪 ID: ${d.nid || '-'}\n📞 HP: ${d.p}\n💼 Posisi: ${d.pt}\n📍 Lokasi: ${d.l}\n📅 Tanggal: ${d.tgl} | ⏰ ${d.jam}\n\n👨‍💼 Supervisor: ${d.sv.nama}\n🕐 Waktu: ${d.sv.time}\n${d.sv.note ? '📝 Catatan: ' + d.sv.note : ''}\n\n📝 Pekerjaan:\n${d.job}\n\n⚠️ Bahaya & Kontrol:\n${(d.hz || []).map(h => `• ${h.name} → ${h.control || '-'}`).join('\n')}\n\n🦺 APD: ${(d.ct || []).join(', ') || '-'}\n\n🔗 Detail:\n${url}`;

  // Kirim WA ke pekerja
  window.open(`https://wa.me/${d.p.replace(/^0/, '62')}?text=${encodeURIComponent(workerMsg)}`, '_blank');

  // Kirim WA ke personil HSE setelah delay 1.5 detik agar tidak tab terbuka bersamaan
  setTimeout(()=>{
    window.open(`https://wa.me/${HSE_NUMBER}?text=${encodeURIComponent(hseMsg)}`, '_blank');
  }, 1500);

  // Tampilkan halaman selesai dengan detail
  showDone(enc);
}

/* ============================================================
   DONE VIEW
   ============================================================ */
function showDone(enc){
  document.getElementById('WM').style.display = 'none';
  document.getElementById('SM').style.display = 'none';
  document.getElementById('SD').style.display  = 'block';
  const data = JSON.parse(LZ.decompress(enc));
  if(!data){ document.getElementById('SD').innerHTML='<div class="section"><p>Data tidak valid.</p></div>'; return; }
  const isA = data.sv && data.sv.status === 'APPROVED';
  document.getElementById('SD').innerHTML = `
    <div class="section">
      <div class="result-card">
        <div class="big">${isA ? '✅' : '❌'}</div>
        <h2 style="color:${isA?'#059669':'#dc2626'}">${isA ? 'APPROVED' : 'REJECTED'}</h2>
        <p style="color:#666;margin-top:8px">${data.sv ? data.sv.time : ''}</p>
      </div>
      <div class="sbox">${summaryHTML(data)}</div>
      ${data.sv ? `<div class="sent-info ${isA?'approved':'rejected'}">
        <strong>👨‍💼 Supervisor:</strong> ${data.sv.nama}<br>
        ${data.sv.note ? `<strong>📝 Catatan:</strong> ${data.sv.note}` : ''}
      </div>` : ''}
    </div>`;
}

/* ============================================================
   WORKER RENDER
   ============================================================ */
function renderWorker(){
  const d = new Date();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  S.tgl = d.toLocaleDateString('id-ID');
  S.jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  renderStep1(); renderStep2(); renderStep3(); renderStep4(); renderStep5(); renderStep6();
  renderHazards(); renderCt(); renderDots();
}

function renderStep1(){
  document.getElementById('step1').innerHTML = `
    <div class="section-title"><span class="icon icon-blue">👤</span>Data Pekerja</div>
    <label>Nama Lengkap *</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap">
    <label>No. ID Pekerja *</label>
    <input type="text" id="nid" placeholder="Contoh: EMP-2024-001">
    <label>No. Telepon (WhatsApp) *</label>
    <input type="tel" id="telp" placeholder="08xxxxxxxxxx">
    <label>Posisi / Jabatan *</label>
    <input type="text" id="posisi" placeholder="Contoh: Operator, Teknisi">
    <label>Lokasi Kerja *</label>
    <input type="text" id="lokasi" placeholder="Area/Site kerja hari ini">
    <label style="margin-top:4px">Pilih Supervisor *</label>
    <select id="spvSelect" onchange="selectSPV(this.value)">
      <option value="">-- Pilih Supervisor --</option>
      ${SUPERVISORS.map((s,i) => `<option value="${i}">${s.name} — ${s.title} (${s.dept})</option>`).join('')}
    </select>
    <div id="spvDetail" style="display:none;background:#dbeafe;border-radius:10px;padding:10px 14px;font-size:.83rem;color:#1e40af;margin-top:-6px;margin-bottom:12px"></div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="next1()">Lanjut →</button>`;
}

function renderStep2(){
  document.getElementById('step2').innerHTML = `
    <div class="section-title"><span class="icon icon-red">❤️</span>Kondisi Kesehatan</div>
    <p style="font-size:.85rem;color:#666;margin-bottom:14px">Jawab dengan jujur untuk keselamatan Anda</p>
    ${hcHTML('hc1','Apakah Anda merasa sehat hari ini?')}
    ${hcHTML('hc2','Apakah Anda cukup tidur (min. 6 jam)?')}
    ${hcHTML('hc3','Apakah Anda bebas dari pengaruh obat/alkohol?')}
    ${hcHTML('hc4','Apakah Anda memahami pekerjaan hari ini?')}
    <div class="row" style="margin-top:16px">
      <button class="btn btn-back" onclick="go(1)">← Kembali</button>
      <button class="btn btn-primary" onclick="next2()">Lanjut →</button>
    </div>`;
}

function renderStep3(){
  document.getElementById('step3').innerHTML = `
    <div class="section-title"><span class="icon icon-orange">⚠️</span>Identifikasi Bahaya</div>
    <label>Deskripsi pekerjaan hari ini *</label>
    <textarea id="jobDesc" rows="3" placeholder="Jelaskan pekerjaan yang akan dilakukan..."></textarea>
    <p style="font-size:.85rem;color:#666;margin:12px 0 8px">Pilih potensi bahaya — setiap bahaya yang dipilih wajib diisi tindakan kontrolnya:</p>
    <div id="hzList"></div>
    <div class="hazard-card" style="border-color:#7c3aed;background:#f5f3ff">
      <div class="hazard-title" style="color:#7c3aed">➕ Bahaya Lainnya</div>
      <p style="font-size:.78rem;color:#666;margin-bottom:8px">Tambahkan bahaya yang tidak ada dalam daftar di atas</p>
      <div id="customHazardList"></div>
      <div class="custom-hazard-row">
        <input type="text" id="customHazardInput" placeholder="Tulis bahaya lainnya...">
        <button class="add-btn" onclick="addCustomHazard()">+ Tambah</button>
      </div>
    </div>
    <div class="row" style="margin-top:16px">
      <button class="btn btn-back" onclick="go(2)">← Kembali</button>
      <button class="btn btn-primary" onclick="next3()">Lanjut →</button>
    </div>`;
  renderHazards();
  renderCustomHazards();
}

function renderStep4(){
  document.getElementById('step4').innerHTML = `
    <div class="section-title"><span class="icon icon-green">🛡️</span>APD yang Digunakan</div>
    <p style="font-size:.85rem;color:#666;margin-bottom:12px">Pilih APD yang akan digunakan selama bekerja:</p>
    <div id="ctList"></div>
    <div class="row" style="margin-top:16px">
      <button class="btn btn-back" onclick="go(3)">← Kembali</button>
      <button class="btn btn-primary" onclick="next4()">Lanjut →</button>
    </div>`;
  renderCt();
}

function renderStep5(){
  document.getElementById('step5').innerHTML = `
    <div class="section-title"><span class="icon icon-purple">📋</span>Review & Kirim ke Supervisor</div>
    <div class="sbox" id="rvBox"></div>
    <div style="margin-top:16px;background:#dbeafe;border-radius:10px;padding:12px;font-size:.82rem;color:#1e40af">
      <strong>📤 Akan dikirim ke Supervisor:</strong><br>
      <span id="spvSendInfo">—</span>
    </div>

/* ============================================================
   HAZARD RENDER — per-hazard control box
   ============================================================ */
function renderHazards(){
  const el = document.getElementById('hzList');
  if(!el) return;
  let h = '';
  HZDATA.forEach(cat => {
    h += `<div class="hazard-card"><div class="hazard-title">${cat.n}</div>`;
    cat.items.forEach((it,i) => {
      const k = cat.id+'_'+i;
      if(!HZ[k]) HZ[k] = {checked:false, control:''};
      const checked = HZ[k].checked;
      h += `<div class="hazard-check">
        <input type="checkbox" id="${k}" ${checked?'checked':''} onchange="toggleHZ('${k}',this.checked)">
        <label for="${k}">${it}</label>
      </div>
      <div class="control-box" id="ctrl_${k}" style="display:${checked?'block':'none'}">
        <label>🛡️ Tindakan kontrol untuk bahaya ini:</label>
        <textarea rows="2" placeholder="Tuliskan tindakan pengendalian risiko..." onchange="HZ['${k}'].control=this.value">${HZ[k].control}</textarea>
      </div>`;
    });
    h += `</div>`;
  });
  el.innerHTML = h;
}

function toggleHZ(k, checked){
  HZ[k].checked = checked;
  const box = document.getElementById('ctrl_'+k);
  if(box) box.style.display = checked ? 'block' : 'none';
}

    document.getElementById('spvSendInfo').textContent = `${spv.name} (${spv.title}) — +${spv.wa}`;

/* ============================================================
   BUILD DATA
   ============================================================ */
function buildData(){
  const hz = [];
  Object.keys(HZ).filter(k=>HZ[k].checked).forEach(k=>{
    const [cid,idx] = k.split('_');
    const cat = HZDATA.find(c=>c.id===cid);
    if(cat) hz.push({name: cat.items[parseInt(idx)], control: HZ[k].control});
  });
  customHazards.forEach(c => hz.push({name: c.text, control: c.control}));
  const ct = [];
  Object.keys(CT).filter(k=>CT[k]).forEach(k=>{ const i=parseInt(k.replace('ct','')); ct.push(CTDATA[i]); });
  const spv = SUPERVISORS[S.spvIdx];
  return { n:S.n, nid:S.nid, p:S.p, pt:S.pt, l:S.l, tgl:S.tgl, jam:S.jam, hc:HC, job:S.job, hz, ct,
           spv_name:spv.name, spv_title:spv.title, spv_wa:spv.wa };
}

/* ============================================================

   ============================================================ */
// ✅ PERBAIKAN 1: Config retry untuk sinyal buruk
const RETRY_CONFIG = {
  maxRetries: 5,
  retryDelay: 3000,
  timeout: 15000
};

// ✅ PERBAIKAN 2: Offline queue
let offlineQueue = JSON.parse(localStorage.getItem('safetyQueue') || '[]');

function saveToQueue(data) {
  offlineQueue.unshift(data);
  localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue.slice(0, 10)));
}

function processQueue() {
  if (offlineQueue.length === 0) return;
  const item = offlineQueue[0];
  sendWAQueued(item).then(success => {
    if (success) offlineQueue.shift();
    localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue));
  });
}

window.addEventListener('online', processQueue);
setInterval(processQueue, 10000);

// ✅ PERBAIKAN 3: Google Sheets dengan retry
async function postToSheet(payload, retries = 0) {
  if (!GAS_URL || GAS_URL === "GANTI_DENGAN_URL_APPS_SCRIPT") return null;
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), RETRY_CONFIG.timeout);
    
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    if (retries < RETRY_CONFIG.maxRetries) {
      await new Promise(r => setTimeout(r, RETRY_CONFIG.retryDelay * (retries + 1)));
      return postToSheet(payload, retries + 1);
    }
    return null;
  }
}

// ✅ PERBAIKAN 4: Progress indicator
function showProgressIndicator(message) {
  let indicator = document.getElementById('progressIndicator');
  if (!indicator) {
    document.querySelector('.container').insertAdjacentHTML('beforeend', 
      '<div id="progressIndicator" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a5276;color:white;padding:12px 20px;border-radius:25px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;font-weight:600;min-width:280px;text-align:center;font-size:0.9rem;display:none"></div>'
    );
    indicator = document.getElementById('progressIndicator');
  }
  indicator.textContent = message;
  indicator.style.display = 'block';
}

function hideProgressIndicator() {
  const indicator = document.getElementById('progressIndicator');
  if (indicator) indicator.style.display = 'none';
}

// ✅ FUNGSI UTAMA - GANTI INI SAJA
async function sendWA(){
  const d = buildData();
  
  showProgressIndicator('📝 Menyimpan data...');
  
  // Backup lokal
  localStorage.setItem('lastDraft', LZ.compress(JSON.stringify(d)));
  
  // Kirim dengan sistem anti-gagal
  const success = await sendWAQueued(d);
  
  if (success) {
    document.getElementById('sentInfo').innerHTML = `
      <strong>✅ Terkirim ke Supervisor!</strong><br>
      ${d.spv_name} — ${d.spv_title}<br>
      <small style="color:#065f46">HSE akan diberitahu setelah supervisor approve/reject...</small>`;
  } else {
    document.getElementById('sentInfo').innerHTML = `
      <strong>⚠️ Tersimpan lokal</strong><br>
      Data akan terkirim otomatis saat sinyal kembali<br>
      <button class="btn btn-primary" onclick="processQueue()" style="margin-top:10px;font-size:0.8rem;padding:8px;width:auto">🔄 Kirim Sekarang</button>`;
  }
  go(6);
}

async function sendWAQueued(data) {
  showProgressIndicator('📡 Menghubungkan internet...');
  
  try {
    // Sheets dulu
    const sheetRes = await postToSheet({ action: "submit", ...data });
    if (sheetRes && sheetRes.ok) data.rowId = sheetRes.rowId;
    
    // WA **HANYA ke Supervisor** (HSE skip di sini)
    const enc = LZ.compress(JSON.stringify(data));
    const vUrl = `${BASE}?v=${enc}`;
    const hzText = (data.hz||[]).map(h=>`• ${h.name}\n  🛡️ Kontrol: ${h.control||'-'}`).join('\n');
    const msg = `🔔 *SAFETY CHECKLIST — MOHON VERIFIKASI*\n\n👷 Pekerja: ${data.n}\n🪪 ID: ${data.nid}\n📞 HP: ${data.p}\n💼 Posisi: ${data.pt}\n📍 Lokasi: ${data.l}\n📅 ${data.tgl} | ⏰ ${data.jam}\n\n📝 Pekerjaan:\n${data.job}\n\n⚠️ Potensi Bahaya & Kontrol:\n${hzText}\n\n🦺 APD:\n${(data.ct||[]).map(c=>'• '+c).join('\n')||'-'}\n\n✅ *Klik untuk verifikasi:*\n${vUrl}`;

    window.open(`https://wa.me/${data.spv_wa.replace(/^0/, '62')}?text=${encodeURIComponent(msg)}`, '_blank');
    
    hideProgressIndicator();
    return true;
  } catch(e) {
    console.error('Send failed:', e);
    saveToQueue(data);
    showProgressIndicator('⚠️ Sinyal lemah\nData tersimpan & akan terkirim otomatis');
    setTimeout(hideProgressIndicator, 4000);
    return false;
  }
}
