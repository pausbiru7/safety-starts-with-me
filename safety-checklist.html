<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;min-height:100vh;padding:12px;line-height:1.5}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12);overflow:hidden}
.header{background:linear-gradient(135deg,#1a5276 0%,#2e86c1 100%);color:#fff;padding:28px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#f59e0b,#10b981,#ef4444,#8b5cf6)}
.header h1{font-size:1.5rem;font-weight:900;letter-spacing:.5px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.header p{font-size:.85rem;opacity:.9;margin-top:6px}
.badge{display:inline-block;background:#f59e0b;color:#fff;font-size:.7rem;padding:4px 12px;border-radius:20px;margin-top:10px;font-weight:700;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.section{padding:24px;border-bottom:1px solid #f1f5f9}
.section:last-child{border-bottom:none}
.section-title{font-size:1.1rem;font-weight:800;color:#1a5276;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.icon-blue{background:#dbeafe;color:#2563eb}
.icon-red{background:#fee2e2;color:#dc2626}
.icon-green{background:#d1fae5;color:#059669}
.icon-orange{background:#ffedd5;color:#ea580c}
.icon-purple{background:#ede9fe;color:#7c3aed}
label{display:block;font-size:.88rem;color:#374151;margin-bottom:6px;font-weight:600}
input,textarea,select{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:.92rem;margin-bottom:16px;transition:all .2s;font-family:inherit;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05)}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2e86c1;box-shadow:0 0 0 4px rgba(46,134,193,.15)}
textarea{resize:vertical;min-height:80px}
.row{display:flex;gap:12px}.row>div{flex:1}
.check-group{margin-bottom:16px}
.check-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid #f3f4f6;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.check-item::before{content:'';position:absolute;left:0;top:0;height:100%;width:4px;transform:scaleY(0);transition:transform .2s}
.check-item:hover{border-color:#2e86c1;background:#f0f7ff;transform:translateX(2px)}
.check-item.sel-g::before{transform:scaleY(1);background:#059669}
.check-item.sel-b::before{transform:scaleY(1);background:#dc2626}
.check-item input[type="radio"],.check-item input[type="checkbox"]{accent-color:#2e86c1;width:18px;height:18px;margin:0;flex-shrink:0}
.check-item label{margin:0;cursor:pointer;font-weight:600;color:#1f2937;flex:1}
.hazard-card{background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.hazard-card .hazard-title{font-weight:800;color:#1a5276;margin-bottom:10px;font-size:1rem}
.hazard-check{display:flex;align-items:flex-start;gap:10px;padding:10px;font-size:.88rem;color:#374151;cursor:pointer;border-radius:8px;transition:all .2s}
.hazard-check:hover{background:#f1f5f9}
.hazard-check input[type="checkbox"]{accent-color:#e74c3c;width:18px;height:18px;margin-top:2px;flex-shrink:0}
.control-box{background:#fffbeb;border:2px solid #f59e0b;border-radius:10px;padding:14px;margin:6px 0 12px 40px;animation:slideIn .3s ease-out}
.control-box label{color:#92400e;font-size:.85rem;font-weight:800;margin-bottom:6px}
.control-box textarea{font-size:.85rem;border-color:#f59e0b;margin-bottom:0}
.control-box textarea:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.custom-hazard-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.add-btn{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.add-btn:hover{background:linear-gradient(135deg,#6d28d9,#7c3aed);transform:translateY(-1px)}
.remove-btn{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.8rem;cursor:pointer;font-weight:600}
.remove-btn:hover{background:#dc2626}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
.btn-approve{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-reject{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-back{background:#f3f4f6;color:#6b7280;border:2px solid #e5e7eb}
.step{display:none}.step.active{display:block;animation:fadeInUp .4s ease-out}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.dots{display:flex;justify-content:center;gap:8px;padding:20px;background:#f8fafc}
.dot{width:12px;height:12px;border-radius:50%;background:#d1d5db;transition:all .3s ease}
.dot.active{background:#2e86c1;width:32px;border-radius:16px;box-shadow:0 0 0 4px rgba(46,134,193,.3)}
.sbox{background:#f8fafc;border-radius:14px;padding:20px;font-size:.86rem;line-height:1.8;border-left:4px solid #2e86c1;margin:16px 0}
.sbox hr{border:none;border-top:1px dashed #d1d5db;margin:12px 0}
.sv-banner{text-align:center;padding:28px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;margin:-24px -24px 20px;border-radius:0 0 16px 16px}
.sv-banner h2{margin:12px 0 8px;font-size:1.4rem;font-weight:900}
.result-card{text-align:center;padding:40px 24px}
.result-card .big{font-size:5rem;margin-bottom:16px;line-height:1}
.sent-info{background:#dbeafe;border-radius:12px;padding:16px;margin-top:16px;font-size:.85rem;color:#1e40af;border-left:4px solid #2563eb}
.sent-info.approved{background:#d1fae5;color:#065f46;border-left-color:#059669}
.sent-info.rejected{background:#fee2e2;color:#991b1b;border-left-color:#dc2626}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;align-items:center;justify-content:center}
.overlay.show{display:flex}
.progress-box{background:#fff;border-radius:20px;padding:32px 28px;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.progress-box .spinner{width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:#2e86c1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-box p{font-weight:700;color:#1a5276;font-size:1rem}
.progress-box small{color:#6b7280;font-size:.82rem}
.footer{padding:20px;text-align:center;font-size:.78rem;color:#9ca3af;border-top:1px solid #f1f5f9}
@media(max-width:480px){.container{margin:0;border-radius:0}.header{padding:20px 16px}.section{padding:16px}}
</style>
</head>
<body>
<div class="container" id="app">

  <div class="header">
    <h1>⛑️ SAFETY STARTS WITH ME</h1>
    <p>Daily Pre-Work Safety Checklist v3.2</p>
    <div class="badge" id="dateDisplay">Loading...</div>
  </div>

  <div class="overlay" id="overlay">

      <div class="spinner"></div>
      <p id="progressMsg">Memproses...</p>
      <small id="progressSub">Mohon tunggu sebentar</small>
    </div>
  </div>

  <div id="WM">
    <div class="dots" id="dots"></div>
    <div class="section step active" id="step1"></div>
    <div class="section step" id="step2"></div>
    <div class="section step" id="step3"></div>
    <div class="section step" id="step4"></div>
    <div class="section step" id="step5"></div>
    <div class="section step" id="step6"></div>
  </div>

  <div id="SM" style="display:none"></div>
  <div id="SD" style="display:none"></div>

  <div class="footer">
    Safety Starts With Me © 2026 | v3.2<br>
    <small>Powered by Pausbiru7</small>
  </div>
</div>

<script>
/* ============================================================
   KONFIGURASI
   ============================================================ */
const CONFIG = {
  BASE_URL : "https://pausbiru7.github.io/safety-starts-with-me/",
  GAS_URL  : "https://script.google.com/macros/s/AKfycbxK-73RZaNNILlvC2ntjqSo6TZbilkS86ue0g2lyG4cGarY9KyOzWl90G2b-wfpMnkjsA/exec",
  HSE_WA   : "6282141150007"
};

const SUPERVISORS = [
  { name:"Muharza",      title:"Project Manager",       wa:"628116923792",  dept:"Project"   },
  { name:"Mudji Agus",   title:"Electrical Supervisor", wa:"6281254346552", dept:"Electrical"},
  { name:"Safarudin",    title:"Mechanical Supervisor", wa:"6281315693779", dept:"Mechanical"},
  { name:"Muh Yusuf",    title:"Project Controller",    wa:"6285399450821", dept:"Project"   },
  { name:"Rengga Wahyu", title:"QA/QC Officer",         wa:"6285783789408", dept:"Quality"   }
];

const HZDATA = [
  {id:'mek', n:'⚙️ Bahaya Mekanik',    items:['Terjepit mesin','Terpotong benda tajam','Tertimpa material','Terbentur benda keras','Terjatuh dari ketinggian']},
  {id:'lis', n:'⚡ Bahaya Listrik',     items:['Tersengat listrik','Korsleting','Kabel terkelupas','Panel listrik rusak']},
  {id:'kim', n:'🧪 Bahaya Kimia',       items:['Terhirup gas/uap berbahaya','Terkena cipratan cairan kimia','Iritasi kulit','Keracunan']},
  {id:'erg', n:'🪑 Bahaya Ergonomi',    items:['Posisi kerja tidak ergonomis','Angkat beban berlebihan','Gerakan berulang','Pencahayaan buruk']},
  {id:'fis', n:'🌡️ Bahaya Fisik',       items:['Kebisingan tinggi','Suhu/cuaca ekstrem','Getaran berlebih','Paparan radiasi']},
  {id:'bio', n:'🦠 Bahaya Biologis',    items:['Paparan bakteri/virus','Gigitan serangga/hewan','Paparan jamur/lumut']},
  {id:'psi', n:'🧠 Bahaya Psikososial', items:['Tekanan kerja tinggi','Konflik antar rekan kerja','Kelelahan mental']}
];

const CTDATA = [
  'Helm Safety','Kacamata Safety','Sarung Tangan','Sepatu Safety',
  'Masker/Respirator','Ear Plug/Muff','Body Harness','Rompi Safety',
  'Face Shield','APD Kimia'
];

/* ============================================================
   LZ COMPRESS — URL SHARING
   ============================================================ */
const LZ = {
  compress(s){
    try{
      return btoa(unescape(encodeURIComponent(s)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }catch(e){ return btoa(s); }
  },
  decompress(s){
    try{
      let b = s.replace(/-/g,'+').replace(/_/g,'/');
      while(b.length % 4) b += '=';
      return decodeURIComponent(escape(atob(b)));
    }catch(e){
      try{ return atob(s); }catch(e2){ return null; }
    }
  }
};

/* ============================================================
   APP STATE
   ============================================================ */
const S = { n:'', nid:'', p:'', pt:'', l:'', tgl:'', jam:'', spvIdx:null, job:'' };
const HC = {};
const HZ = {};
const CT = {};
let customHazards = [];
let curStep = 1;
const TOTAL_STEPS = 6;

/* ============================================================
   INIT & ROUTING
   ============================================================ */
function init(){
  const params = new URLSearchParams(location.search);
  const vParam = params.get('v');
  const dParam = params.get('d');

  if(vParam){ showSupervisor(vParam); return; }
  if(dParam){ showDone(dParam); return; }

  loadDraft();
  setDateTime();
  renderWorker();
}

function setDateTime(){
  const d = new Date();
  S.tgl = d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
  S.jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateDisplay').textContent =
    d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

/* ============================================================
   GAS FETCH WRAPPER
   ============================================================ */
async function postToGAS(payload){
  const TIMEOUT  = 20000;
  const MAX_RETRY = 3;

  for(let attempt = 1; attempt <= MAX_RETRY; attempt++){
    try{
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT);

      const res = await fetch(CONFIG.GAS_URL, {
        method : 'POST',
        body   : JSON.stringify(payload),
        signal : controller.signal
        // TANPA Content-Type — hindari CORS preflight
      });

      clearTimeout(timer);
      if(!res.ok) throw new Error(`HTTP Error: ${res.status}`);

      const text = await res.text();
      try{ return JSON.parse(text); }
      catch(e){ return { ok:true, rowId:'GAS-'+Date.now(), raw:text }; }

    }catch(err){
      console.warn(`GAS attempt ${attempt} failed:`, err.message);
      if(attempt === MAX_RETRY) throw err;
      await sleep(1500 * attempt);
    }
  }
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   OFFLINE QUEUE
   ============================================================ */
let offlineQueue = [];
try{ offlineQueue = JSON.parse(localStorage.getItem('safetyQueue') || '[]'); }
catch(e){ offlineQueue = []; }

function saveToQueue(data){
  offlineQueue.unshift({ ...data, _queuedAt: Date.now() });
  offlineQueue = offlineQueue.slice(0, 5);
  localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue));
}

async function processQueue(){
  if(!navigator.onLine || offlineQueue.length === 0) return;
  const item = offlineQueue[0];
  try{
    const res = await postToGAS({ action:'submit', ...item });
    if(res && res.ok){
      offlineQueue.shift();
      localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue));
      console.log('Queue synced:', res.rowId);
    }
  }catch(e){ console.warn('Queue sync failed:', e.message); }
}

window.addEventListener('online', processQueue);
setInterval(processQueue, 15000);

/* ============================================================
   PROGRESS OVERLAY
   ============================================================ */
function showProgress(msg, sub){
  document.getElementById('progressMsg').textContent = msg || 'Memproses...';
  document.getElementById('progressSub').textContent = sub || 'Mohon tunggu sebentar';
  document.getElementById('overlay').classList.add('show');
}

function hideProgress(){
  document.getElementById('overlay').classList.remove('show');
}

/* ============================================================
   RENDER WORKER
   ============================================================ */
function renderWorker(){
  renderStep1();
  renderStep2();
  renderStep3();
  renderStep4();
  renderStep5();
  renderStep6('—','—');
  renderDots();
}

/* --- STEP 1: DATA DIRI --- */
function renderStep1(){
  document.getElementById('step1').innerHTML = `
    <div class="section-title">
      <span class="icon icon-blue">👤</span>Data Diri Pekerja
    </div>
    <label>Nama Lengkap *</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap"
      value="${escHtml(S.n)}" oninput="autoSaveDraft()">

    <label>No. ID Pekerja *</label>
    <input type="text" id="nid" placeholder="EMP-2024-001"
      value="${escHtml(S.nid)}" oninput="autoSaveDraft()">

    <label>No. WhatsApp *</label>
    <input type="tel" id="telp" placeholder="08123456789"
      value="${escHtml(S.p)}" oninput="autoSaveDraft()">

    <label>Posisi / Jabatan *</label>
    <input type="text" id="posisi" placeholder="Operator, Teknisi, dll"
      value="${escHtml(S.pt)}" oninput="autoSaveDraft()">

    <label>Lokasi Kerja Hari Ini *</label>
    <input type="text" id="lokasi" placeholder="Area/Site kerja"
      value="${escHtml(S.l)}" oninput="autoSaveDraft()">

    <label>Pilih Supervisor *</label>
    <select id="spvSelect" onchange="selectSPV(this.value)">
      <option value="">-- Pilih Supervisor --</option>
      ${SUPERVISORS.map((s,i) => `
        <option value="${i}" ${S.spvIdx == i ? 'selected' : ''}>
          ${escHtml(s.name)} — ${escHtml(s.title)}
        </option>`).join('')}
    </select>

    <div id="spvDetail" style="display:${S.spvIdx !== null ? 'block' : 'none'};
      background:#dbeafe;border-radius:12px;padding:14px;
      font-size:.85rem;color:#1e40af;margin-top:-8px;margin-bottom:16px"></div>

    <button class="btn btn-primary" onclick="next1()">
      Lanjut ke Kesehatan →
    </button>`;

  if(S.spvIdx !== null) renderSPVDetail(S.spvIdx);
}

function selectSPV(val){
  S.spvIdx = val === '' ? null : parseInt(val);
  renderSPVDetail(S.spvIdx);
  autoSaveDraft();
}

function renderSPVDetail(idx){
  const el  = document.getElementById('spvDetail');
  if(!el) return;
  const spv = SUPERVISORS[idx];
  if(!spv){ el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = `
    👨‍💼 <strong>${escHtml(spv.name)}</strong><br>
    💼 ${escHtml(spv.title)} &bull; ${escHtml(spv.dept)}<br>
    📱 <strong>+${spv.wa}</strong>`;
}

/* --- STEP 2: KESEHATAN --- */
function renderStep2(){
  document.getElementById('step2').innerHTML = `
    <div class="section-title">
      <span class="icon icon-red">❤️</span>Kondisi Kesehatan
    </div>
    <div style="background:#fef2f2;border-radius:10px;padding:12px;
      border-left:4px solid #ef4444;margin-bottom:20px;font-size:.88rem;color:#7f1d1d">
      ⚠️ Jawab dengan <strong>JUJUR</strong> untuk keselamatan Anda dan rekan kerja!
    </div>
    ${buildHCItem('hc1','Apakah Anda merasa sehat hari ini?')}
    ${buildHCItem('hc2','Apakah Anda tidur cukup minimal 6 jam semalam?')}
    ${buildHCItem('hc3','Apakah Anda bebas dari pengaruh obat-obatan/alkohol?')}
    ${buildHCItem('hc4','Apakah Anda memahami pekerjaan dan risiko hari ini?')}
    <div class="row">
      <button class="btn btn-back" onclick="goStep(1)">← Kembali</button>
      <button class="btn btn-primary" onclick="next2()">Lanjut ke Bahaya →</button>
    </div>`;

  Object.entries(HC).forEach(([id, val]) => {
    document.querySelectorAll(`[data-hc="${id}"]`).forEach(el => {
      if(el.dataset.val === val){
        el.classList.add(val === 'ya' ? 'sel-g' : 'sel-b');
        const r = el.querySelector('input[type="radio"]');
        if(r) r.checked = true;
      }
    });
  });
}

function buildHCItem(id, q){
  return `
    <div class="check-group">
      <p style="font-size:.92rem;font-weight:700;margin-bottom:10px;color:#1f2937">${q}</p>
      <div class="check-item" data-hc="${id}" data-val="ya"
        onclick="selHC('${id}','ya',this)">
        <input type="radio" name="${id}">
        <label>✅ Ya, siap kerja</label>
      </div>
      <div class="check-item" data-hc="${id}" data-val="tidak"
        onclick="selHC('${id}','tidak',this)">
        <input type="radio" name="${id}">
        <label>❌ Tidak</label>
      </div>
    </div>`;
}

function selHC(id, val, el){
  HC[id] = val;
  el.parentElement.querySelectorAll('.check-item').forEach(c => {
    c.classList.remove('sel-g','sel-b');
    c.querySelector('input').checked = false;
  });
  el.classList.add(val === 'ya' ? 'sel-g' : 'sel-b');
  el.querySelector('input').checked = true;
  autoSaveDraft();
}

/* --- STEP 3: BAHAYA --- */
function renderStep3(){
  document.getElementById('step3').innerHTML = `
    <div class="section-title">
      <span class="icon icon-orange">⚠️</span>Identifikasi Bahaya
    </div>
    <label>Deskripsi pekerjaan hari ini *</label>
    <textarea id="jobDesc" rows="3"
      placeholder="Jelaskan secara detail pekerjaan yang akan dilakukan..."
      oninput="autoSaveDraft()">${escHtml(S.job)}</textarea>

    <p style="font-size:.86rem;color:#6b7280;margin:0 0 12px">
      Centang potensi bahaya & <strong>wajib</strong> isi tindakan kontrol:
    </p>

    <div id="hzList"></div>

    <div class="hazard-card" style="border-color:#7c3aed;background:#f5f3ff">

      <div id="customHazardList"></div>
      <div class="custom-hazard-row">

      <button class="btn btn-primary" onclick="next3()">Lanjut ke APD →</button>
    </div>`;

  renderHazardList();
  renderCustomHazardList();
}

function renderHazardList(){
  const el = document.getElementById('hzList');
  if(!el) return;
  let html = '';

  HZDATA.forEach(cat => {
    html += `
      <div class="hazard-card">
        <div class="hazard-title">${cat.n}</div>`;

    cat.items.forEach((item, i) => {
      const key     = `${cat.id}_${i}`;
      if(!HZ[key]) HZ[key] = { checked:false, control:'' };
      const checked = HZ[key].checked;

      html += `
        <div class="hazard-check" onclick="toggleHZ('${key}',event)">
          <input type="checkbox" id="${key}" ${checked ? 'checked' : ''}
  onchange="HZ['${key}'].checked=this.checked;updateHZBox('${key}');autoSaveDraft()"
  onclick="event.stopPropagation()">
          <label for="${key}" onclick="event.stopPropagation()">${escHtml(item)}</label>
        </div>
        <div class="control-box" id="ctrl_${key}"
          style="display:${checked ? 'block' : 'none'}">
          <label>🛡️ Tindakan kontrol wajib:</label>
          <textarea id="ctrltext_${key}"
            placeholder="Tuliskan langkah pengendalian risiko..."
            oninput="HZ['${key}'].control=this.value;autoSaveDraft()"
            >${escHtml(HZ[key].control)}</textarea>
        </div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

function toggleHZ(key, event){
  const cb = document.getElementById(key);
  if(!cb) return;

  /* FIX: Toggle manual karena event fired sebelum checkbox berubah */
  if(event && event.target === cb){
    /* Klik langsung di checkbox — biarkan browser handle, 
       ambil nilai setelah browser update */
    setTimeout(() => {
      HZ[key].checked = cb.checked;
      updateHZBox(key);
      autoSaveDraft();
    }, 0);
  } else {
    /* Klik di div — toggle manual */
    cb.checked = !cb.checked;
    HZ[key].checked = cb.checked;
    updateHZBox(key);
    autoSaveDraft();
  }
}

function updateHZBox(key){
  const box = document.getElementById('ctrl_' + key);
  if(!box) return;

  if(HZ[key].checked){
    box.style.display = 'block';
    setTimeout(() => {
      const ta = document.getElementById('ctrltext_' + key);
      if(ta) ta.focus();
    }, 100);
  } else {
    box.style.display = 'none';
    /* Reset control jika unchecked */
    const ta = document.getElementById('ctrltext_' + key);
    if(ta) ta.value = '';
    HZ[key].control = '';
  }
}

async function doApprove(){
  const svNama = document.getElementById('svNama').value.trim();
  const svNote = document.getElementById('svNote').value.trim();
  if(!svNama){ showAlert('Masukkan nama supervisor terlebih dahulu'); return; }

  const data = window._svData;
  data.sv = {
    nama   : svNama,
    status : 'APPROVED',
    note   : svNote,
    time   : new Date().toLocaleString('id-ID')
  };

  showProgress('📤 Menyimpan ke Google Sheets...', 'Mohon tunggu');
  try{
    await postToGAS({
      action  : 'respond',
      rowId   : data.rowId,
      status  : 'APPROVED',
      sv_name : svNama,
      sv_note : svNote,
      sv_time : data.sv.time
    });
  }catch(e){ console.warn('GAS respond failed (non-critical):', e.message); }
  hideProgress();

  kirimNotifikasiKeWorker(data);

  const enc = LZ.compress(JSON.stringify(data));
  showDone(enc);
}

async function doReject(){
  const svNama = document.getElementById('svNama').value.trim();
  const svNote = document.getElementById('svNote').value.trim();
  if(!svNama){ showAlert('Masukkan nama supervisor terlebih dahulu'); return; }

      sv_note : svNote,

    });

  showDone(enc);
}

function next1(){
  S.n   = sanitize(document.getElementById('nama').value);
  S.nid = sanitize(document.getElementById('nid').value);
  S.p   = document.getElementById('telp').value.replace(/[^0-9]/g, '');

function next2(){
  const answered = Object.keys(HC).length;
  if(answered < 4){
    showAlert(`⚠️ Jawab semua pertanyaan kesehatan.\n(${answered}/4 terjawab)`);
    return;
  }
  if(Object.values(HC).some(v => v === 'tidak')){
    showAlert(

      'Anda menjawab "Tidak" pada salah satu pertanyaan.\n' +
      'Laporkan ke supervisor sebelum memulai pekerjaan.'

  }
  goStep(3);

function next3(){
  const jobEl = document.getElementById('jobDesc');
  if(jobEl) S.job = sanitize(jobEl.value);

  if(!S.job){
    showAlert('⚠️ Isi deskripsi pekerjaan hari ini');
    return;
  }

  const totalHZ = Object.values(HZ).filter(h => h.checked).length
                + customHazards.length;
  if(totalHZ === 0){
    showAlert('⚠️ Pilih minimal 1 potensi bahaya');
    return;
  }

  const missingStd = Object.values(HZ)
    .filter(h => h.checked && !h.control.trim()).length;
  const missingCustom = customHazards
    .filter(h => !h.control.trim()).length;

  if(missingStd + missingCustom > 0){
    showAlert(
      `⚠️ ${missingStd + missingCustom} bahaya belum diisi tindakan kontrolnya.\n` +
      'Isi semua tindakan kontrol sebelum melanjutkan.'
    );
    return;
  }

  autoSaveDraft();
  goStep(4);

function goStep(n){
  if(n === 2) renderStep2();
  if(n === 3) renderStep3();
  if(n === 4) renderStep4();
  if(n === 5) renderStep5();

  curStep = n;
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === n);
  });
  renderDots();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function renderDots(){
  const el = document.getElementById('dots');
  if(!el) return;
  let html = '';
  for(let i = 1; i <= TOTAL_STEPS; i++){
    html += `<div class="dot ${i === curStep ? 'active' : ''}"></div>`;
  }
  el.innerHTML = html;
}

/* ============================================================
   BUILD DATA & SUMMARY
   ============================================================ */
function buildData(){
  const hz = [];
  Object.entries(HZ).forEach(([key, val]) => {
    if(!val.checked) return;
    const [catId, idxStr] = key.split('_');
    const cat = HZDATA.find(c => c.id === catId);
    if(cat && cat.items[parseInt(idxStr)]){
      hz.push({ name: cat.items[parseInt(idxStr)], control: val.control.trim() });
    }
  });
  customHazards.forEach(c => {
    hz.push({ name: c.text, control: c.control.trim() });
  });

  const ct = [];
  CTDATA.forEach((item, i) => {
    if(CT['ct' + i]) ct.push(item);
  });

  const spv = SUPERVISORS[S.spvIdx] || {};

  return {
    n        : S.n,
    nid      : S.nid,
    p        : S.p,
    pt       : S.pt,
    l        : S.l,
    tgl      : S.tgl,
    jam      : S.jam,
    hc       : { ...HC },
    job      : S.job,
    hz       : hz,
    ct       : ct,
    spv_name : spv.name   || '',
    spv_title: spv.title  || '',
    spv_wa   : spv.wa     || '',
    spv_dept : spv.dept   || ''
  };
}

function buildSummaryHTML(d){
  const hcIcons = Object.values(d.hc || {})
    .map(v => v === 'ya' ? '✅' : '❌').join(' ');

  const hzHTML = (d.hz || []).map(h => `
    <div style="margin:6px 0;padding:8px;background:#fff;
      border-radius:8px;border-left:3px solid #ef4444">
      <span style="color:#dc2626;font-weight:700">⚠️ ${escHtml(h.name)}</span><br>
      <span style="color:#059669;font-size:.85rem;padding-left:4px">
        🛡️ ${escHtml(h.control)}
      </span>
    </div>`).join('');

  const ctText = (d.ct || []).length > 0
    ? d.ct.map(c => escHtml(c)).join(', ')
    : '<em style="color:#9ca3af">Tidak ada APD dipilih</em>';

  return `
    <strong>👤 ${escHtml(d.n)}</strong>
    &nbsp;|&nbsp; 🪪 ${escHtml(d.nid)}
    &nbsp;|&nbsp; 📞 ${escHtml(d.p)}<br>
    <strong>💼 ${escHtml(d.pt)}</strong>
    &nbsp;|&nbsp; 📍 ${escHtml(d.l)}<br>
    <strong>📅 ${escHtml(d.tgl)}</strong>
    &nbsp;|&nbsp; ⏰ ${escHtml(d.jam)}
    <hr>
    <strong>❤️ Kesehatan:</strong> ${hcIcons}<br>
    <strong>📝 Pekerjaan:</strong> ${escHtml(d.job)}
    <hr>
    <strong>⚠️ Potensi Bahaya (${(d.hz || []).length}):</strong>
    <div style="margin-top:8px">
      ${hzHTML || '<em style="color:#9ca3af">Tidak ada</em>'}
    </div>
    <hr>
    <strong>🛡️ APD:</strong> ${ctText}`;
}

/* ============================================================
   SUBMIT CHECKLIST
   FIX: renderStep6 dipanggil SEBELUM goStep(6)
   ============================================================ */
async function submitChecklist(){
  const data = buildData();

  if(!data.n || !data.spv_wa){
    showAlert('Data tidak lengkap. Kembali dan periksa kembali.');
    return;
  }

  showProgress('💾 Menyimpan ke Google Sheets...', 'Mohon tunggu sebentar');

  let rowId = 'LOCAL-' + Date.now();

  try{
    const res = await postToGAS({ action:'submit', ...data });
    if(res && res.rowId) rowId = res.rowId;
    data.rowId = rowId;
  }catch(e){
    console.warn('GAS submit failed, offline mode:', e.message);
    data.rowId = rowId;
    saveToQueue(data);
  }

  hideProgress();

  /* Buat URL verifikasi untuk supervisor */
  const enc  = LZ.compress(JSON.stringify(data));
  const vUrl = `${CONFIG.BASE_URL}?v=${enc}`;

  /* Buat pesan WA supervisor */
  const hzText = data.hz.map(h =>
    `• ${h.name}\n  🛡️ ${h.control}`
  ).join('\n');

  const ctText = data.ct.length > 0
    ? data.ct.join(', ')
    : 'Tidak ada';

  const msg =
    `🔔 *SAFETY CHECKLIST - MOHON VERIFIKASI*\n\n` +
    `👷 Nama     : ${data.n}\n` +
    `🪪 ID       : ${data.nid}\n` +
    `📞 WA       : ${data.p}\n` +
    `💼 Jabatan  : ${data.pt}\n` +
    `📍 Lokasi   : ${data.l}\n` +
    `📅 Tanggal  : ${data.tgl} | ⏰ ${data.jam}\n\n` +
    `📝 *Pekerjaan:*\n${data.job}\n\n` +
    `⚠️ *Potensi Bahaya:*\n${hzText}\n\n` +
    `🛡️ *APD:* ${ctText}\n\n` +
    `━━━━━━━━━━━━━━━━━━━━\n` +
    `✅ *Klik link berikut untuk VERIFIKASI:*\n${vUrl}`;

  /* Bersihkan draft */
  localStorage.removeItem('safetyDraft');

  /* Buka WA supervisor */
  const spvWA = data.spv_wa.replace(/^0/, '62').replace(/[^0-9]/g, '');
  window.open(
    `https://wa.me/${spvWA}?text=${encodeURIComponent(msg)}`,
    '_blank'
  );

  /* FIX: render dulu, baru goStep */
  renderStep6(rowId, data.spv_name);
  goStep(6);
}

/* ============================================================
   DRAFT — AUTO SAVE & LOAD
   ============================================================ */
function autoSaveDraft(){
  try{
    const draft = {
      S             : { ...S },
      HC            : { ...HC },
      HZ            : { ...HZ },
      CT            : { ...CT },
      customHazards : [...customHazards]
    };
    localStorage.setItem('safetyDraft', LZ.compress(JSON.stringify(draft)));
  }catch(e){
    console.warn('Draft save failed:', e.message);
  }
}

function loadDraft(){
  try{
    const raw = localStorage.getItem('safetyDraft');
    if(!raw) return;

    const decoded = LZ.decompress(raw);
    if(!decoded) return;

    const draft = JSON.parse(decoded);

    if(draft.S)             Object.assign(S, draft.S);
    if(draft.HC)            Object.assign(HC, draft.HC);
    if(draft.HZ)            Object.assign(HZ, draft.HZ);
    if(draft.CT)            Object.assign(CT, draft.CT);
    if(draft.customHazards) customHazards = draft.customHazards;

  }catch(e){
    console.warn('Draft load failed, clearing:', e.message);
    localStorage.removeItem('safetyDraft');
  }
}

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */

/* Sanitasi input — cegah XSS */
function sanitize(str){
  if(typeof str !== 'string') return '';
  return str
    .replace(/[<>&"'`]/g, '')
    .trim()
    .substring(0, 200);
}

/* Escape HTML untuk display */
function escHtml(str){
  if(typeof str !== 'string') return '';
  return str
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

/* Custom alert — lebih baik dari native alert() */
function showAlert(msg){
  let alertEl = document.getElementById('globalAlert');
  if(!alertEl){
    document.body.insertAdjacentHTML('beforeend', `
      <div id="globalAlert" style="
        display      : none;
        position     : fixed;
        top          : 20px;
        left         : 50%;
        transform    : translateX(-50%);
        background   : #fff;
        border       : 2px solid #ef4444;
        border-radius: 16px;
        padding      : 20px 24px;
        max-width    : 340px;
        width        : 90%;
        z-index      : 9999;
        box-shadow   : 0 20px 60px rgba(0,0,0,.25);
        text-align   : center;
        font-size    : .92rem;
        color        : #1f2937;
        line-height  : 1.6">
        <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
        <div id="globalAlertMsg"></div>
        <button onclick="closeAlert()" style="
          margin-top   : 16px;
          background   : #ef4444;
          color        : #fff;
          border       : none;
          border-radius: 10px;
          padding      : 10px 28px;
          font-weight  : 700;
          font-size    : .9rem;
          cursor       : pointer;
          width        : 100%">
          OK, Mengerti
        </button>
      </div>`);
    alertEl = document.getElementById('globalAlert');
  }

  document.getElementById('globalAlertMsg').innerHTML =
    msg.replace(/\n/g, '<br>');
  alertEl.style.display = 'block';
}

function closeAlert(){
  const el = document.getElementById('globalAlert');
  if(el) el.style.display = 'none';
}

/* Reset app untuk checklist baru */
function resetApp(){
  Object.keys(S).forEach(k => { S[k] = k === 'spvIdx' ? null : ''; });
  Object.keys(HC).forEach(k => delete HC[k]);
  Object.keys(HZ).forEach(k => delete HZ[k]);
  Object.keys(CT).forEach(k => delete CT[k]);
  customHazards = [];
  localStorage.removeItem('safetyDraft');
  location.href = '.';
}

/* ============================================================
   JALANKAN APP
   ============================================================ */
init();
processQueue();
</script>
