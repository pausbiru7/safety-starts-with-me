<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Starts With Me</title>
<style>
/* ===== CSS utama (responsive + modern) ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;padding:12px}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden}
.header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:24px;text-align:center}
.header h1{font-size:1.4rem;font-weight:800;letter-spacing:1px}
.header p{font-size:.82rem;opacity:.85;margin-top:4px}
.badge{display:inline-block;background:#e74c3c;color:#fff;font-size:.7rem;padding:3px 10px;border-radius:20px;margin-top:8px;font-weight:700}
.section{padding:20px;border-bottom:1px solid #eee}
.section-title{font-size:1rem;font-weight:700;color:#1a5276;margin-bottom:14px;display:flex;align-items:center;gap:8px}
input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:.9rem;margin-bottom:12px;transition:border .2s;font-family:inherit;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2e86c1;box-shadow:0 0 0 3px rgba(46,134,193,.15)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff}
.btn-wa{background:#25d366;color:#fff}
.btn-back{background:#eee;color:#555}
.row{display:flex;gap:10px}
.row>div{flex:1}
.dots{display:flex;justify-content:center;gap:6px;padding:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:all .3s}
.dot.active{background:#2e86c1;width:24px;border-radius:5px}
.footer{padding:16px;text-align:center;font-size:.75rem;color:#999}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>⛑️ SAFETY STARTS WITH ME</h1>
    <p>Daily Pre-Work Safety Checklist</p>
    <div class="badge" id="dateDisplay"></div>
  </div>

  <!-- Worker Mode -->
  <div id="WM">
    <div class="dots" id="dots"></div>
    <div class="section step active" id="step1"></div>
    <div class="section step" id="step2"></div>
    <div class="section step" id="step3"></div>
    <div class="section step" id="step4"></div>
    <div class="section step" id="step5"></div>
    <div class="section step" id="step6"></div>
  </div>

  <!-- Supervisor Mode -->
  <div id="SM" style="display:none"></div>

  <!-- Done Mode -->
  <div id="SD" style="display:none"></div>

  <div class="footer">Safety Starts With Me © 2026 | v3.0</div>
</div>

<script>
/* ====================== KONFIGURASI ====================== */
const BASE = "https://pausbiru7.github.io/safety-starts-with-me/safety-checklist.html";
const GAS_URL = "GAS_URL_HARUS_AKTIF"; // ganti dengan Apps Script URL
const HSE_NUMBER = "6282141150007";
const SUPERVISORS = [
  {name:"Muharza", title:"Project Manager", wa:"628116923792", dept:"Project"},
  {name:"Mudji Agus", title:"Electrical Supervisor", wa:"6281254346552", dept:"Project"},
  {name:"Safarudin", title:"Mechanical Supervisor", wa:"6281315693779", dept:"Project"},
  {name:"Muh Yusuf", title:"Project Controller", wa:"6285399450821", dept:"Project"},
  {name:"Rengga Wahyu", title:"QA/QC Officer", wa:"6285783789408", dept:"Project"}
];

/* ====================== LZ COMPRESS/DECOMPRESS ====================== */
const LZ = {
  compress(s){ const enc=new TextEncoder().encode(s); return btoa(String.fromCharCode(...enc)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); },
  decompress(s){ try{ let b=s.replace(/-/g,'+').replace(/_/g,'/'); while(b.length%4)b+='='; const str=atob(b); const arr=Uint8Array.from([...str].map(c=>c.charCodeAt(0))); return new TextDecoder().decode(arr); }catch(e){ return null; }}
};

/* ====================== STATE ====================== */
const S={n:'',nid:'',p:'',pt:'',l:'',tgl:'',jam:'',spvIdx:null}; 
const HC={}; const HZ={}; const CT={}; let customHazards=[]; let cur=1; const STEPS=6;
const RETRY_CONFIG={maxRetries:5,retryDelay:3000,timeout:15000};
let offlineQueue=JSON.parse(localStorage.getItem('safetyQueue')||'[]');

/* ====================== PROGRESS ====================== */
function showProgress(msg){let ind=document.getElementById('progressIndicator');if(!ind){document.body.insertAdjacentHTML('beforeend',`<div id="progressIndicator" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a5276;color:white;padding:12px 20px;border-radius:25px;z-index:9999;font-weight:600;min-width:280px;text-align:center;font-size:0.9rem;display:none"></div>`);ind=document.getElementById('progressIndicator');}ind.textContent=msg;ind.style.display='block';}
function hideProgress(){const ind=document.getElementById('progressIndicator');if(ind)ind.style.display='none';}

/* ====================== POST TO SHEET ====================== */
async function postToSheet(payload,retries=0){if(!GAS_URL)return null;try{const controller=new AbortController();const timeoutId=setTimeout(()=>controller.abort(),RETRY_CONFIG.timeout);const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});clearTimeout(timeoutId);if(!res.ok)throw new Error(`HTTP ${res.status}`);return await res.json();}catch(e){if(retries<RETRY_CONFIG.maxRetries){await new Promise(r=>setTimeout(r,RETRY_CONFIG.retryDelay*(retries+1)));return postToSheet(payload,retries+1);}console.warn('postToSheet failed:',e);return null;}}

/* ====================== OFFLINE QUEUE & WA ====================== */
function saveToQueue(data){offlineQueue.unshift(data);localStorage.setItem('safetyQueue',JSON.stringify(offlineQueue.slice(0,10)));}
async function processQueue(){if(offlineQueue.length===0)return;const item=offlineQueue[0];const success=await sendWAQueued(item);if(success){offlineQueue.shift();localStorage.setItem('safetyQueue',JSON.stringify(offlineQueue));}}
async function sendWAQueued(data){showProgress('📡 Menghubungkan internet...');try{const sheetRes=await postToSheet({action:'submit',...data});if(sheetRes && sheetRes.ok)data.rowId=sheetRes.rowId;const enc=LZ.compress(JSON.stringify(data));const vUrl=`${BASE}?v=${enc}`;const hzText=(data.hz||[]).map(h=>`• ${h.name}\n  🛡️ Kontrol: ${h.control||'-'}`).join('\n');const msg=`🔔 SAFETY CHECKLIST\n👷 ${data.n}\n🪪 ${data.nid}\n⚠️ Bahaya & Kontrol:\n${hzText}\n✅ Klik untuk verifikasi: ${vUrl}`;const wa=window.open(`https://wa.me/${data.spv_wa.replace(/^0/,'62')}?text=${encodeURIComponent(msg)}`,'_blank');if(!wa)alert('WA diblok, silakan kirim manual');hideProgress();return true;}catch(e){console.error('Send WA failed:',e);saveToQueue(data);showProgress('⚠️ Sinyal lemah, data tersimpan & akan terkirim otomatis');setTimeout(hideProgress,4000);return false;}
}
window.addEventListener('online',processQueue);setInterval(processQueue,10000);

/* ====================== INIT APP ====================== */
function init(){const p=new URLSearchParams(location.search);if(p.get('v')){showSupervisor(p.get('v'));return;}if(p.get('d')){showDone(p.get('d'));return;}renderWorker();}
init();
</script>
