<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Starts With Me</title>
<!-- PWA -->
<link rel="manifest" href="data:application/manifest+json,{
  \"name\":\"Safety Starts With Me\",\"short_name\":\"Safety Checklist\",\"start_url\":\".\",
  \"display\":\"standalone\",\"background_color\":\"#1a5276\",\"theme_color\":\"#2e86c1\",
  \"icons\":[{\"src\":\"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjMWExMjc2Ii8+Cjx0ZXh0IHg9Ijk2IiB5PSIxMjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIzMCIgZm9udC13ZWlnaHQ9IjgwMCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPlM8L3RleHQ+Cjwvc3ZnPg==\",\"sizes\":\"192x192\"}]}">
<meta name="theme-color" content="#1a5276">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f8;min-height:100vh;padding:12px;line-height:1.5}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12);overflow:hidden}
.header{background:linear-gradient(135deg,#1a5276 0%,#2e86c1 100%);color:#fff;padding:28px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#f59e0b,#10b981,#ef4444,#8b5cf6)}
.header h1{font-size:1.5rem;font-weight:900;letter-spacing:.5px;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.header p{font-size:.85rem;opacity:.9;margin-top:6px}
.badge{display:inline-block;background:#f59e0b;color:#fff;font-size:.7rem;padding:4px 12px;border-radius:20px;margin-top:10px;font-weight:700;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.section{padding:24px;border-bottom:1px solid #f1f5f9}
.section:last-child{border-bottom:none}
.section-title{font-size:1.1rem;font-weight:800;color:#1a5276;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.15)}

.icon-blue{background:#dbeafe;color:#2563eb}
.icon-red{background:#fee2e2;color:#dc2626}
.icon-green{background:#d1fae5;color:#059669}
.icon-orange{background:#ffedd5;color:#ea580c}
.icon-purple{background:#ede9fe;color:#7c3aed}

label{display:block;font-size:.88rem;color:#374151;margin-bottom:6px;font-weight:600}
input,textarea,select{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:.92rem;margin-bottom:16px;transition:all .2s;font-family:inherit;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05)}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2e86c1;box-shadow:0 0 0 4px rgba(46,134,193,.15),0 1px 3px rgba(0,0,0,.1)}
textarea{resize:vertical;min-height:80px}

.row{display:flex;gap:12px}.row>div{flex:1}
.check-group{margin-bottom:16px}
.check-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid #f3f4f6;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.check-item::before{content:'';position:absolute;left:0;top:0;height:100%;width:4px;transform:scaleY(0);transition:transform .2s}
.check-item:hover{border-color:#2e86c1;background:#f0f7ff;transform:translateX(2px)}
.check-item.sel-g::before{transform:scaleY(1);background:#059669}
.check-item.sel-b::before{transform:scaleY(1);background:#dc2626}
.check-item input[type="radio"],.check-item input[type="checkbox"]{accent-color:#2e86c1;width:18px;height:18px;margin:0;flex-shrink:0}
.check-item label{margin:0;cursor:pointer;font-weight:600;color:#1f2937;flex:1}

.hazard-card{background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.hazard-card .hazard-title{font-weight:800;color:#1a5276;margin-bottom:10px;font-size:1rem}
.hazard-check{display:flex;align-items:flex-start;gap:10px;padding:10px 0;font-size:.88rem;color:#374151;cursor:pointer}
.hazard-check:hover{background:#f1f5f9;padding-left:8px;border-radius:8px}
.hazard-check input[type="checkbox"]{accent-color:#e74c3c;width:18px;height:18px;margin-top:2px;flex-shrink:0}

.control-box{background:#fffbeb !important;border:2px solid #f59e0b !important;border-radius:10px !important;padding:14px !important;margin:6px 0 12px 40px !important;animation:slideIn .3s ease-out}
.control-box label{color:#92400e;font-size:.85rem;font-weight:800;margin-bottom:6px}
.control-box textarea{font-size:.85rem !important;border-color:#f59e0b !important}
.control-box textarea:focus{border-color:#d97706 !important;box-shadow:0 0 0 3px rgba(245,158,11,.2)}

@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

.custom-hazard-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.custom-hazard-row input[type="text"]{margin-bottom:0;flex:1}
.add-btn{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.add-btn:hover{background:linear-gradient(135deg,#6d28d9,#7c3aed);transform:translateY(-1px)}
.remove-btn{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.8rem;cursor:pointer;transition:all .2s;font-weight:600}
.remove-btn:hover{background:#dc2626}

.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,transparent,rgba(255,255,255,.3),transparent,transparent);transition:left .5s}
.btn:hover::before{left:100%}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
.btn-approve{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-reject{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-back{background:#f3f4f6;color:#6b7280;border:2px solid #e5e7eb}

.step{display:none}.step.active{display:block;animation:fadeInUp .4s ease-out}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.dots{display:flex;justify-content:center;gap:8px;padding:20px;background:#f8fafc}
.dot{width:12px;height:12px;border-radius:50%;background:#d1d5db;transition:all .3s ease}
.dot.active{background:#2e86c1;width:32px;border-radius:16px;transform:scale(1.1);box-shadow:0 0 0 4px rgba(46,134,193,.3)}

.sbox{background:#f8fafc;border-radius:14px;padding:20px;font-size:.86rem;line-height:1.7;border-left:4px solid #2e86c1;margin:16px 0}
.sbox strong{color:#1a5276;display:block;margin-bottom:4px}
.sbox hr{border:none;border-top:1px dashed #d1d5db;margin:16px 0;opacity:.5}

.sv-banner{text-align:center;padding:28px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;margin:-24px -24px 20px;border-radius:0 0 16px 16px;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.sv-banner h2{margin:12px 0 8px;font-size:1.4rem;font-weight:900}
.result-card{text-align:center;padding:50px 24px}
.result-card .big{font-size:5rem;margin-bottom:16px;line-height:1}
.sent-info{background:#dbeafe;border-radius:12px;padding:16px;margin-top:20px;font-size:.85rem;color:#1e40af;text-align:left;border-left:4px solid #2563eb;box-shadow:0 2px 8px rgba(37,99,235,.1)}
.sent-info.approved{background:#d1fae5;color:#065f46;border-left-color:#059669}
.sent-info.rejected{background:#fee2e2;color:#991b1b;border-left-color:#dc2626}

.footer{padding:20px;text-align:center;font-size:.78rem;color:#9ca3af;border-top:1px solid #f1f5f9}
#progressIndicator{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(26,82,118,.95);color:white;padding:14px 24px;border-radius:25px;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:9999;font-weight:700;min-width:300px;text-align:center;font-size:.95rem;display:none;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2)}

@media (max-width:480px){.container{margin:0 8px;border-radius:16px}.header{padding:24px 20px}.section{padding:20px}}
</style>
</head>
<body>
<div class="container" id="app">
<div class="header">
  <h1>⛑️ SAFETY STARTS WITH ME</h1>
  <p>Daily Pre-Work Safety Checklist v3.1</p>
  <div class="badge" id="dateDisplay">Loading...</div>
</div>

<!-- WORKER MODE -->
<div id="WM">
  <div class="dots" id="dots"></div>
  <div class="section step active" id="step1"></div>
  <div class="section step" id="step2"></div>
  <div class="section step" id="step3"></div>
  <div class="section step" id="step4"></div>
  <div class="section step" id="step5"></div>
  <div class="section step" id="step6"></div>
</div>

<!-- SUPERVISOR MODE -->
<div id="SM" style="display:none"></div>

<!-- DONE MODE -->
<div id="SD" style="display:none"></div>

<div class="footer">
  Safety Starts With Me © 2024 | Production Ready<br>
  <small>Powered by Google Apps Script + WhatsApp</small>
</div>
</div>

<script>
/* ============================================================
   KONFIGURASI — UPDATE INI SAJA!
   ============================================================ */
const BASE_URL = "https://pausbiru7.github.io/safety-starts-with-me/"; // Ganti dengan domain kamu
const GAS_URL = "https://script.google.com/macros/s/AKfycbxK-73RZaNNILlvC2ntjqSo6TZbilkS86ue0g2lyG4cGarY9KyOzWl90G2b-wfpMnkjsA/exec"; // UPDATE DENGAN URL DEPLOYMENT BARU!
const HSE_NUMBER = "6282141150007"; // Nomor HSE

const SUPERVISORS = [
  { name: "Muharza", title: "Project Manager", wa: "628116923792", dept: "Project" },
  { name: "Mudji Agus", title: "Electrical Supervisor", wa: "6281254346552", dept: "Electrical" },
  { name: "Safarudin", title: "Mechanical Supervisor", wa: "6281315693779", dept: "Mechanical" },
  { name: "Muh Yusuf", title: "Project Controller", wa: "6285399450821", dept: "Project" },
  { name: "Rengga Wahyu", title: "QA/QC Officer", wa: "6285783789408", dept: "Quality" }
];

/* LZString Compression untuk URL sharing */
const LZ = {
  compress(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'') },
  decompress(s){ try{ let b=s.replace(/-/g,'+').replace(/_/g,'/'); while(b.length%4)b+='='; return decodeURIComponent(escape(atob(b))) }catch(e){ return null } }
};

/* App State */
const S = { n:'', nid:'', p:'', pt:'', l:'', tgl:'', jam:'', spvIdx:null };
const HC = {}; const HZ = {}; const CT = {}; let customHazards = [];
let cur = 1; const STEPS = 6;

const HZDATA = [
  {id:'mek',n:'⚙️ Bahaya Mekanik',items:['Terjepit mesin','Terpotong benda tajam','Tertimpa material','Terbentur benda keras','Terjatuh dari ketinggian']},
  {id:'lis',n:'⚡ Bahaya Listrik',items:['Tersengat listrik','Korsleting','Kabel terkelupas','Panel listrik rusak']},
  {id:'kim',n:'🧪 Bahaya Kimia',items:['Terhirup gas/uap berbahaya','Terkena cipratan cairan kimia','Iritasi kulit','Keracunan']},
  {id:'erg',n:'🪑 Bahaya Ergonomi',items:['Posisi kerja tidak ergonomis','Angkat beban berlebihan','Gerakan berulang','Pencahayaan buruk']},
    {id:'fis',n:'🌡️ Bahaya Fisik',items:['Kebisingan tinggi','Suhu/cuaca ekstrem','Getaran berlebih','Paparan radiasi']},
  {id:'bio',n:'🦠 Bahaya Biologis',items:['Paparan bakteri/virus','Gigitan serangga/hewan','Paparan jamur/lumut']},
  {id:'psi',n:'🧠 Bahaya Psikososial',items:['Tekanan kerja tinggi','Konflik antar rekan kerja','Kelelahan mental']}
];

const CTDATA = ['Helm Safety','Kacamata Safety','Sarung Tangan','Sepatu Safety','Masker/Respirator','Ear Plug/Muff','Body Harness','Rompi Safety','Face Shield','APD Kimia'];

/* ============================================================
   INIT & ROUTING
   ============================================================ */
function init(){
  const p = new URLSearchParams(location.search);
  if(p.get('v')){ showSupervisor(p.get('v')); return; }
  if(p.get('d')){ showDone(p.get('d')); return; }
  
  loadDraft();
  const d = new Date();
  document.getElementById('dateDisplay').textContent = d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  S.tgl = d.toLocaleDateString('id-ID');
  S.jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  
  renderWorker();
  registerServiceWorker();
}

function registerServiceWorker(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('data:text/javascript;base64,'+btoa(`
      self.addEventListener('fetch',e=>{
        e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
      });
      self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));
    `));
  }
}

/* ============================================================
   SUPERVISOR MODE
   ============================================================ */
function showSupervisor(enc){
  document.getElementById('WM').style.display = 'none';
  document.getElementById('SM').style.display = 'block';
  
  const data = JSON.parse(LZ.decompress(enc));
  if(!data){
    document.getElementById('SM').innerHTML = '<div class="section"><p style="color:#dc2626;font-weight:800;text-align:center;padding:40px">❌ Data tidak valid. Silakan ulangi checklist.</p></div>';
    return;
  }
  
  document.getElementById('SM').innerHTML = `
    <div class="sv-banner">
      <div style="font-size:2.8rem">🔍</div>
      <h2>Verifikasi Supervisor</h2>
      <p style="opacity:.9;font-size:.88rem">Periksa & setujui checklist safety</p>
    </div>
    <div class="sbox">${summaryHTML(data)}</div>
    <label>Nama Supervisor *</label>
    <input type="text" id="svNama" placeholder="Masukkan nama lengkap" value="${data.spv_name||''}">
    <label>Catatan (opsional)</label>
    <textarea id="svNote" rows="3" placeholder="Catatan persetujuan / alasan penolakan..."></textarea>
    <div class="row">
      <button class="btn btn-approve" onclick="approve('${encodeURIComponent(enc)}')">✅ SETUJUI</button>
      <button class="btn btn-reject" onclick="reject('${encodeURIComponent(enc)}')">❌ TOLAK</button>
    </div>
  `;
  window._vdata = data;
}

async function approve(enc){
  const decodedEnc = decodeURIComponent(enc);
  const d = window._vdata;
  const sn = document.getElementById('svNama').value.trim();
  const sv = document.getElementById('svNote').value.trim();
  
  if(!sn){ alert('Masukkan nama supervisor'); return; }
  
  d.sv = { nama: sn, status: 'APPROVED', note: sv, time: new Date().toLocaleString('id-ID') };
  
  showProgress('📤 Mengupdate Google Sheets...');
  await postToSheet({ action: "respond", rowId: d.rowId, status: 'APPROVED', sv_name: sn, sv_note: sv });
  hideProgress();
  
  sendNotifications(d, true);
  showDone(LZ.compress(JSON.stringify(d)));
}

async function reject(enc){
  const decodedEnc = decodeURIComponent(enc);
  const d = window._vdata;
  const sn = document.getElementById('svNama').value.trim();
  const sv = document.getElementById('svNote').value.trim();
  
  if(!sn){ alert('Masukkan nama supervisor'); return; }
  if(!sv){ alert('Berikan alasan penolakan'); return; }
  
  d.sv = { nama: sn, status: 'REJECTED', note: sv, time: new Date().toLocaleString('id-ID') };
  
  showProgress('📤 Mengupdate Google Sheets...');
  await postToSheet({ action: "respond", rowId: d.rowId, status: 'REJECTED', sv_name: sn, sv_note: sv });
  hideProgress();
  
  sendNotifications(d, false);
  showDone(LZ.compress(JSON.stringify(d)));
}

function sendNotifications(d, isApproved){
  const enc = LZ.compress(JSON.stringify(d));
  const url = `${BASE_URL}?d=${enc}`;
  
  const workerMsg = isApproved
    ? `✅ *CHECKLIST DISETUJUI*\n\nHalo ${d.n}!\n\n👨‍💼 Supervisor: ${d.sv.nama}\n🕐 ${d.sv.time}\n${d.sv.note ? '📝 ' + d.sv.note : ''}\n\n🔗 Detail: ${url}`
    : `❌ *CHECKLIST DITOLAK*\n\nHalo ${d.n}!\n\n👨‍💼 Supervisor: ${d.sv.nama}\n📝 ${d.sv.note}\n🕐 ${d.sv.time}\n\n🔗 Detail: ${url}`;
  
  const hseMsg = `📋 *SAFETY CHECKLIST ${isApproved ? '✅ APPROVED' : '❌ REJECTED'}*\n\n👷 ${d.n}\n🪪 ${d.nid}\n📞 ${d.p}\n💼 ${d.pt}\n📍 ${d.l}\n📅 ${d.tgl} ${d.jam}\n\n👨‍💼 ${d.sv.nama}\n${d.sv.note ? '📝 ' + d.sv.note : ''}\n\n🔗 ${url}`;
  
  window.open(`https://wa.me/${d.p.replace(/^0/,'62')}?text=${encodeURIComponent(workerMsg)}`, '_blank');
  setTimeout(()=>window.open(`https://wa.me/${HSE_NUMBER}?text=${encodeURIComponent(hseMsg)}`, '_blank'), 1500);
}

/* ============================================================
   DONE VIEW
   ============================================================ */
function showDone(enc){
  document.getElementById('WM').style.display = 'none';
  document.getElementById('SM').style.display = 'none';
  document.getElementById('SD').style.display = 'block';
  
  const data = JSON.parse(LZ.decompress(enc));
  if(!data){
    document.getElementById('SD').innerHTML = '<div class="section"><p style="color:#dc2626;text-align:center;padding:40px">❌ Data tidak valid</p></div>';
    return;
  }
  
  const isApproved = data.sv?.status === 'APPROVED';
  document.getElementById('SD').innerHTML = `
    <div class="result-card">
      <div class="big">${isApproved ? '✅' : '❌'}</div>
      <h2 style="color:${isApproved ? '#059669' : '#dc2626'};font-size:1.6rem;font-weight:900;margin-bottom:12px">${isApproved ? 'DISETUJUI' : 'DITOLAK'}</h2>
      <p style="color:#6b7280;font-size:1.1rem">${data.sv?.time || 'Menunggu verifikasi...'}</p>
    </div>
    <div class="sbox">${summaryHTML(data)}</div>
    ${data.sv ? `<div class="sent-info ${isApproved ? 'approved' : 'rejected'}">
      <strong>👨‍💼 Supervisor:</strong> ${data.sv.nama}<br>
      ${data.sv.note ? `<strong>${isApproved ? '📝 Catatan:' : '📝 Alasan:'}</strong> ${data.sv.note}` : ''}
    </div>` : ''}
    <button class="btn btn-primary" onclick="location.href='.'">🔄 Checklist Baru</button>
  `;
}

/* ============================================================
   WORKER MODE - RENDER STEPS
   ============================================================ */
function renderWorker(){
  renderStep1(); renderStep2(); renderStep3(); renderStep4(); renderStep5(); renderStep6();
  renderHazards(); renderCt(); renderDots(); renderCustomHazards();
}

function renderStep1(){
  document.getElementById('step1').innerHTML = `
    <div class="section-title"><span class="icon icon-blue">👤</span>Data Diri Pekerja</div>
    <label>Nama Lengkap *</label><input type="text" id="nama" placeholder="Masukkan nama lengkap" value="${S.n}" onchange="autoSaveDraft()">
    <label>No. ID Pekerja *</label><input type="text" id="nid" placeholder="EMP-2024-001" value="${S.nid}" onchange="autoSaveDraft()">
    <label>No. WhatsApp *</label><input type="tel" id="telp" placeholder="08123456789" value="${S.p}" onchange="autoSaveDraft()">
    <label>Posisi / Jabatan *</label><input type="text" id="posisi" placeholder="Operator, Teknisi, dll" value="${S.pt}" onchange="autoSaveDraft()">
    <label>Lokasi Kerja Hari Ini *</label><input type="text" id="lokasi" placeholder="Area/Site kerja" value="${S.l}" onchange="autoSaveDraft()">
    <label>Pilih Supervisor *</label>
    <select id="spvSelect" onchange="selectSPV(this.value)">
      <option value="">-- Pilih Supervisor --</option>
      ${SUPERVISORS.map((s,i)=>`<option value="${i}" ${S.spvIdx==i?'selected':''}>${s.name} — ${s.title}</option>`).join('')}
    </select>
    <div id="spvDetail" style="display:${S.spvIdx!==null?'block':'none'};background:#dbeafe;border-radius:12px;padding:14px;font-size:.85rem;color:#1e40af;margin-top:4px"></div>
    <button class="btn btn-primary" onclick="next1()">Lanjut ke Kesehatan →</button>`;
  
  if(S.spvIdx!==null) selectSPV(S.spvIdx);
}

function renderStep2(){
  document.getElementById('step2').innerHTML = `
    <div class="section-title"><span class="icon icon-red">❤️</span>Kondisi Kesehatan</div>
    <p style="font-size:.88rem;color:#6b7280;margin-bottom:20px;padding:12px;background:#fef2f2;border-radius:10px;border-left:4px solid #ef4444">Jawab JUJUR untuk keselamatan Anda dan rekan kerja!</p>
    ${hcHTML('hc1','Apakah Anda merasa sehat hari ini?')}
    ${hcHTML('hc2','Apakah Anda tidur cukup minimal 6 jam semalam?')}
    ${hcHTML('hc3','Apakah Anda bebas dari pengaruh obat-obatan/alkohol?')}

/* ============================================================
   GOOGLE SHEETS API + OFFLINE QUEUE
   ============================================================ */
const RETRY_CONFIG = {maxRetries:5, retryDelay:3000, timeout:15000};
let offlineQueue = JSON.parse(localStorage.getItem('safetyQueue') || '[]');

async function postToSheet(payload, retries=0){
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), RETRY_CONFIG.timeout);
    
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      signal:controller.signal
    });
    clearTimeout(timeoutId);
    
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }catch(e){
    if(retries < RETRY_CONFIG.maxRetries){
      await new Promise(r=>setTimeout(r, RETRY_CONFIG.retryDelay*(retries+1)));
      return postToSheet(payload, retries+1);
    }
    throw e;
  }
}

function saveToQueue(data){
  offlineQueue.unshift(data);
  localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue.slice(0,10)));
}

async function processQueue(){
  if(offlineQueue.length===0 || !navigator.onLine) return;
  const item = offlineQueue[0];
  try{
    const res = await postToSheet({action:"submit", ...item});
    if(res.ok){
      offlineQueue.shift();
      localStorage.setItem('safetyQueue', JSON.stringify(offlineQueue));
    }
  }catch(e){
    console.warn('Queue failed:', e);
  }
}

window.addEventListener('online', processQueue);
setInterval(processQueue, 10000);

function renderHazards(){
  const el = document.getElementById('hzList');
  if(!el) return;
  let html = '';
  HZDATA.forEach(cat=>{
    html += `<div class="hazard-card"><div class="hazard-title">${cat.n}</div>`;
    cat.items.forEach((item,i)=>{
      const key = cat.id+'_'+i;
      if(!HZ[key]) HZ[key] = {checked:false, control:''};
      const checked = HZ[key].checked;
      html += `
        <div class="hazard-check" onclick="toggleHZ('${key}', !${checked})">
          <input type="checkbox" id="${key}" ${checked?'checked':''}>
          <label for="${key}">${item}</label>
        </div>
        <div class="control-box" id="ctrl_${key}" style="display:${checked?'block':'none'}">
          <label>🛡️ Tindakan kontrol wajib:</label>

                    onchange="HZ['${key}'].control=this.value;autoSaveDraft()">${HZ[key].control}</textarea>
        </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function toggleHZ(key, checked){
  HZ[key].checked = checked;
  const box = document.getElementById('ctrl_'+key);
  box.style.display = checked ? 'block' : 'none';
  if(checked) box.querySelector('textarea').focus();
  autoSaveDraft();
}

  }
  if(!/^08\d{8,12}$/.test(S.p)){
    alert('Format HP: 08123456789'); return;
  }
  if(S.spvIdx===null){
    alert('Pilih supervisor'); return;
  }
  go(2);
}

function next2(){
  if(Object.keys(HC).length < 4){
    alert('Jawab semua pertanyaan kesehatan'); return;
  }
  if(Object.values(HC).some(v=>v==='tidak')){
    alert('⚠️ Kondisi kesehatan tidak memenuhi syarat kerja!'); return;
  }
  go(3);
}

function next3(){
  S.job = sanitize(document.getElementById('jobDesc').value);
  if(!S.job){ alert('Isi deskripsi pekerjaan'); return; }
  
  const hazards = Object.values(HZ).filter(h=>h.checked).length + customHazards.length;
  if(hazards === 0){ alert('Pilih minimal 1 potensi bahaya'); return; }
  
  const missingCtrl = Object.values(HZ).filter(h=>h.checked && !h.control.trim()).length +
                     customHazards.filter(h=>!h.control.trim()).length;
  if(missingCtrl > 0){ alert('Isi kontrol untuk semua bahaya yang dipilih'); return; }
  
  go(4);
}

function next4(){ go(5); }

function go(n){
  if(n===3){ renderStep3(); renderHazards(); renderCustomHazards(); }
  if(n===4){ renderStep4(); renderCt(); }
  if(n===5){
    renderStep5();
    document.getElementById('rvBox').innerHTML = summaryHTML(buildData());
    const spv = SUPERVISORS[S.spvIdx];
    document.getElementById('spvSendInfo').textContent = `${spv.name} (${spv.title})`;
  }
  
  cur = n;
  document.querySelectorAll('.step').forEach((s,i)=>s.classList.toggle('active', i+1===n));
  renderDots();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDots(){
  let html = '';
  for(let i=1; i<=STEPS; i++){
    html += `<div class="dot ${i===cur ? 'active' : ''}"></div>`;
  }
  document.getElementById('dots').innerHTML = html;
}

/* ============================================================
   CORE FUNCTIONS
   ============================================================ */
function sanitize(str){
  return str.replace(/[<>&"']/g, '').trim().substring(0, 100);
}

function buildData(){
  const hz = [];
  Object.entries(HZ).filter(([k,v])=>v.checked).forEach(([k,v])=>{
    const [catId,idx] = k.split('_');
    const cat = HZDATA.find(c=>c.id===catId);
    if(cat) hz.push({name: cat.items[parseInt(idx)], control: v.control});
  });
  customHazards.forEach(c=>hz.push({name: c.text, control: c.control}));
  
  const ct = Object.entries(CT).filter(([k,v])=>v).map(([k])=>{
    const i = parseInt(k.replace('ct',''));
    return CTDATA[i];
  });
  
  const spv = SUPERVISORS[S.spvIdx];
  return {
    n: S.n, nid: S.nid, p: S.p, pt: S.pt, l: S.l,
    tgl: S.tgl, jam: S.jam, hc: HC, job: S.job, hz, ct,
    spv_name: spv.name, spv_title: spv.title, spv_wa: spv.wa
  };
}

function summaryHTML(d){
  const hzList = (d.hz||[]).map(h=>`
    <div style="margin:6px 0">
      <span style="color:#dc2626;font-weight:700">⚠️ ${h.name}</span><br>
      <span style="padding-left:20px;color:#059669">🛡️ ${h.control}</span>
    </div>
  `).join('');
  
  return `
    <strong>👤 ${d.n}</strong> | 🪪 ${d.nid} | 📞 ${d.p}<br>
    <strong>💼 ${d.pt}</strong> | 📍 ${d.l}<br>
    <strong>📅 ${d.tgl} | ⏰ ${d.jam}</strong><hr>
    <strong>❤️ Kesehatan:</strong> ${Object.entries(d.hc||{}).map(([k,v])=>`${v==='ya'?'✅':'❌'}`).join(' ')}<br>
    <strong>📝 Pekerjaan:</strong> ${d.job}<br>
    <strong>⚠️ ${d.hz?.length || 0} Bahaya:</strong><br>${hzList}<br>
    <strong>🛡️ APD:</strong> ${d.ct?.join(', ') || 'Tidak ada'}
  `;
}

async function sendWA(){
  const data = buildData();
  showProgress('📝 Validasi data...');
  
  try{
    showProgress('💾 Menyimpan ke Google Sheets...');
    const sheetRes = await postToSheet({action: "submit", ...data});
    data.rowId = sheetRes.rowId;
    
    showProgress('📱 Membuka WhatsApp...');
    const enc = LZ.compress(JSON.stringify(data));
    const vUrl = `${BASE_URL}?v=${enc}`;
    
    const hzText = data.hz.map(h=>`• ${h.name}\n  🛡️ ${h.control}`).join('\n');
    const msg = `🔔 *SAFETY CHECKLIST - VERIFIKASI*\n\n👷 ${data.n}\n🪪 ${data.nid}\n📞 ${data.p}\n💼 ${data.pt}\n📍 ${data.l}\n📅 ${data.tgl} ${data.jam}\n\n📝 ${data.job}\n\n⚠️ BAHAYA:\n${hzText}\n\n🛡️ APD: ${data.ct.join(', ') || '-'}\n\n✅ *Verifikasi sekarang:*\n${vUrl}`;
    
    window.open(`https://wa.me/${data.spv_wa.replace(/^0/,'62')}?text=${encodeURIComponent(msg)}`, '_blank');
    
    localStorage.removeItem('safetyDraft');
    go(6);
    document.getElementById('sentInfo').innerHTML = `
      <strong>✅ Terkirim ke ${data.spv_name}!</strong><br>
      ID: <strong>${data.rowId}</strong><br>
      <small>HSE akan diberitahu setelah approval</small>
    `;
    
  }catch(e){
    console.error(e);
    saveToQueue(data);
    alert('⚠️ Offline mode: Data tersimpan lokal & akan terkirim otomatis');
    go(6);
    document.getElementById('sentInfo').innerHTML = `
      <strong>💾 Tersimpan Lokal (Offline)</strong><br>
      ID Draft: ${Date.now()}<br>
      <small>Otomatis sync saat online</small>
    `;
  }
}

/* ============================================================
   DRAFT & PERSISTENCE
   ============================================================ */
function autoSaveDraft(){
  const draft = {S, HC, HZ, CT, customHazards};
  localStorage.setItem('safetyDraft', LZ.compress(JSON.stringify(draft)));
}

function loadDraft(){
  try{
    const draftStr = localStorage.getItem('safetyDraft');
    if(!draftStr) return;
    
    const draft = JSON.parse(LZ.decompress(draftStr));
    Object.assign(S, draft.S || {});
    Object.assign(HC, draft.HC || {});
    Object.assign(HZ, draft.HZ || {});
    Object.assign(CT, draft.CT || {});
    customHazards = draft.customHazards || [];
    S.spvIdx = draft.S?.spvIdx || null;
  }catch(e){
    console.warn('Draft corrupt, ignore');
  }
}
